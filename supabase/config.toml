# Fair Go Supabase local config.
# Create the hosted project in Sydney: ap-southeast-2
# See docs/zero-knowledge-sync-requirements.md

project_id = "fair-go"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[functions.prelogin]
verify_jwt = false

[functions.recovery-prelogin]
verify_jwt = false

[functions.recovery-reset]
verify_jwt = false
