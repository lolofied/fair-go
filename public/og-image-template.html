<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                width: 1200px;
                height: 630px;
                overflow: hidden;
            }

            body {
                font-family: Poppins, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
                background: linear-gradient(135deg, rgb(255 255 255) 0%, rgb(244 248 255) 100%);
                color: oklch(0.205 0 0);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .canvas {
                width: 1200px;
                height: 630px;
                padding: 72px 80px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 28px;
            }

            /* Matches FairGoWordmark: gap-2.5, size-7 icon, text-xl font-bold font-wordmark */
            .wordmark {
                display: inline-flex;
                align-items: center;
                gap: 16px;
                align-self: flex-start;
            }

            .wordmark-icon {
                width: 42px;
                height: 42px;
                border-radius: 6px;
                object-fit: cover;
                flex-shrink: 0;
            }

            .wordmark-text {
                font-family: Fraunces, Georgia, "Times New Roman", serif;
                font-size: 30px;
                font-weight: 700;
                line-height: 1;
                letter-spacing: -0.75px;
                text-transform: lowercase;
                color: oklch(0.205 0 0);
            }

            .headline {
                max-width: 920px;
                font-size: 56px;
                font-weight: 600;
                line-height: 1.08;
                letter-spacing: -0.02em;
                color: oklch(0.205 0 0);
            }

            .subhead {
                max-width: 820px;
                font-size: 24px;
                font-weight: 400;
                line-height: 1.5;
                color: oklch(0.439 0 0);
            }

            .badge {
                align-self: flex-start;
                margin-top: 8px;
                padding: 10px 18px;
                border-radius: 9999px;
                background: oklch(0.205 0 0);
                color: white;
                font-size: 15px;
                font-weight: 500;
                line-height: 1;
                letter-spacing: -0.01em;
            }
        </style>
    </head>
    <body>
        <div class="canvas">
            <div class="wordmark">
                <img class="wordmark-icon" src="fair-go-logo.png" alt="" />
                <span class="wordmark-text">fair go</span>
            </div>
            <h1 class="headline">Were you unfairly dismissed?</h1>
            <p class="subhead">A free 90-second eligibility check under Australia's Fair Work Act.</p>
            <div class="badge">Private. Yours only.</div>
        </div>
    </body>
</html>
